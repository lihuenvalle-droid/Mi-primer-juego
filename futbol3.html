<div id="score">P1: 0 - P2: 0</div>
<canvas id="gameCanvas" width="800" height="400"></canvas>
<div class="controls-hint">
  <div><strong>J1 (Rojo):</strong> W (Saltar), A/D (Mover), S (Patear)</div>
  <div><strong>J2 (Verde):</strong> ↑ (Saltar), ←/→ (Mover), ↓ (Patear)</div>
</div>

<style>
  body {
    margin: 0; background: #111; font-family: Impact, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
  }
  #score { color: white; font-size: 32px; font-weight: bold; margin-bottom: 10px; }
  canvas { background: linear-gradient(to bottom, #87CEEB 70%, #458B00 70%); border: 4px solid white; }
  .controls-hint { color: #aaa; margin-top: 15px; front-size: 14px; display: flex; gap: 40px; }
</style>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreDiv = document.getElementById("score");
  let score1 = 0, score2 = 0;
  const gravity = 0.6;

  const p1 = { x: 100, y: 280, radius: 25, color: "#ff4757", vx: 0, vy: 0, isGrounded: true, kicking: false };
  const p2 = { x: 650, y: 280, radius: 25, color: "#2ed573", vx: 0, vy: 0, isGrounded: true, kicking: false };
  const ball = { x: 400, y: 150, radius: 25, color: "#ffffff", vx: 0, vy: 0 };

  const goalWidth = 40, goalHeight = 240;
  const p1Goal = { x: 0, y: 400 - goalHeight, w: goalWidth, h: goalHeight };
  const p2Goal = { x: 800 - goalWidth, y: 400 - goalHeight, w: goalWidth, h: goalHeight };
  const keys = {};

  window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
  window.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
    if (e.key.toLowerCase() === 's') p1.kicking = false;
    if (e.key === 'ArrowDown') p2.kicking = false;
  });

  function reset() {
    ball.x = 400; ball.y = 150; ball.vx = 0; ball.vy = 0;
    p1.x = 100; p2.x = 650;
  }

  function loop() {
    // J1
    if (keys['a']) p1.vx = -5; else if (keys['d']) p1.vx = 5; else p1.vx = 0;
    if (keys['w'] && p1.isGrounded) { p1.vy = -12; p1.isGrounded = false; }
    if (keys['s']) p1.kicking = true;

    // J2
    if (keys['arrowleft']) p2.vx = -5; else if (keys['arrowright']) p2.vx = 5; else p2.vx = 0;
    if (keys['arrowup'] && p2.isGrounded) { p2.vy = -12; p2.isGrounded = false; }
    if (keys['arrowdown']) p2.kicking = true;

    [p1, p2].forEach(p => {
      p.vy += gravity; p.x += p.vx; p.y += p.vy;
      if (p.y >= 280) { p.y = 280; p.vy = 0; p.isGrounded = true; }
      if (p.x - p.radius < 0) p.x = p.radius; if (p.x + p.radius > 800) p.x = 800 - p.radius;
    });

    ball.vy += gravity * 0.7; ball.x += ball.vx; ball.y += ball.vy;
    ball.vx *= 0.98; ball.vy *= 0.98;

    if (ball.y >= 265) { ball.y = 265; ball.vy = -ball.vy * 0.6; ball.vx *= 0.95; }
    if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy = -ball.vy * 0.6; }

    if (ball.y < p1Goal.y) {
      if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx = -ball.vx * 0.6; }
      if (ball.x + ball.radius > 800) { ball.x = 800 - ball.radius; ball.vx = -ball.vx * 0.6; }
    }

    if (ball.x < goalWidth && ball.y >= p1Goal.y) { score2++; scoreDiv.innerText = `P1: ${score1} - P2: ${score2}`; reset(); }
    else if (ball.x > 800 - goalWidth && ball.y >= p2Goal.y) { score1++; scoreDiv.innerText = `P1: ${score1} - P2: ${score2}`; reset(); }

    [p1, p2].forEach(p => {
      let dx = ball.x - p.x, dy = ball.y - p.y, dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < p.radius + ball.radius) {
        let angle = Math.atan2(dy, dx), speed = p.kicking ? 16 : 8;
        ball.vx = Math.cos(angle) * speed; ball.vy = Math.sin(angle) * speed - 3;
      }
    });

    ctx.clearRect(0, 0, 800, 400);
    ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.fillRect(0, p1Goal.y, goalWidth, goalHeight); ctx.fillRect(800-goalWidth, p2Goal.y, goalWidth, goalHeight);
    ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.strokeRect(0, p1Goal.y, goalWidth, goalHeight); ctx.strokeRect(800-goalWidth, p2Goal.y, goalWidth, goalHeight);

    ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI*2); ctx.fillStyle = p1.color; ctx.fill();
    ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.radius, 0, Math.PI*2); ctx.fillStyle = p2.color; ctx.fill();
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fillStyle = ball.color; ctx.fill(); ctx.stroke();

    requestAnimationFrame(loop);
  }
  reset(); loop();
</script>
