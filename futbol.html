<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Masters 2D</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #score {
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        canvas {
            background: linear-gradient(to bottom, #87CEEB 70%, #458B00 70%);
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .controls-hint {
            color: #aaa;
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
            display: flex;
            gap: 40px;
        }
    </style>
</head>
<body>

    <div id="score">P1: 0 - P2: 0</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    
    <div class="controls-hint">
        <div><strong>Jugador 1:</strong> W (Saltar), A/D (Mover), S (Patear)</div>
        <div><strong>Jugador 2:</strong> ↑ (Saltar), ←/→ (Mover), ↓ (Patear)</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDiv = document.getElementById("score");

        let score1 = 0;
        let score2 = 0;

        // Configuración física básica
        const gravity = 0.6;

        // Jugador 1
        const p1 = {
            x: 100, y: 200, radius: 25, color: "#ff4757",
            vx: 0, vy: 0, isGrounded: false, kicking: false
        };

        // Jugador 2
        const p2 = {
            x: 650, y: 200, radius: 25, color: "#2ed573",
            vx: 0, vy: 0, isGrounded: false, kicking: false
        };

        // La Pelota
        const ball = {
            x: 400, y: 150, radius: 15, color: "#ffffff",
            vx: 0, vy: 0
        };

        // Arcos (Porterías)
        const goalWidth = 40;
        const goalHeight = 120;
        const p1Goal = { x: 0, y: 400 - goalHeight, w: goalWidth, h: goalHeight };
        const p2Goal = { x: 800 - goalWidth, y: 400 - goalHeight, w: goalWidth, h: goalHeight };

        // Teclas presionadas
        const keys = {};

        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => {
            keys[e.key.toLowerCase()] = false;
            if (e.key.toLowerCase() === 's') p1.kicking = false;
            if (e.key === 'ArrowDown') p2.kicking = false;
        });

        function resetPositions() {
            ball.x = 400; ball.y = 150; ball.vx = 0; ball.vy = 0;
            p1.x = 100; p1.y = 280; p1.vx = 0; p1.vy = 0;
            p2.x = 650; p2.y = 280; p2.vx = 0; p2.vy = 0;
        }

        function updatePlayer(p, isP1) {
            // Controles de movimiento
            if (isP1) {
                if (keys['a']) p.vx = -5;
                else if (keys['d']) p.vx = 5;
                else p.vx = 0;
                
                if (keys['w'] && p.isGrounded) { p.vy = -12; p.isGrounded = false; }
                if (keys['s']) p.kicking = true;
            } else {
                if (keys['arrowleft']) p.vx = -5;
                else if (keys['arrowright']) p.vx = 5;
                else p.vx = 0;
                
                if (keys['arrowup'] && p.isGrounded) { p.vy = -12; p.isGrounded = false; }
                if (keys['arrowdown']) p.kicking = true;
            }

            // Aplicar gravedad y físicas
            p.vy += gravity;
            p.x += p.vx;
            p.y += p.vy;

            // Límites del piso (el pasto empieza a los 280px de alto)
            if (p.y >= 280) {
                p.y = 280;
                p.vy = 0;
                p.isGrounded = true;
            }

            // Límites de las paredes laterales
            if (p.x - p.radius < 0) p.x = p.radius;
            if (p.x + p.radius > 800) p.x = 800 - p.radius;
        }

        function updateBall() {
            ball.vy += gravity * 0.7; // La pelota cae un poco más lento
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Fricción constante en el aire/suelo
            ball.vx *= 0.98;
            ball.vy *= 0.98;

            // Rebote en el suelo
            if (ball.y >= 265) {
                ball.y = 265;
                ball.vy = -ball.vy * 0.6; // Rebota
                ball.vx *= 0.95; // Fricción con el pasto
            }

            // Rebote en el techo
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy = -ball.vy * 0.6;
            }

            // Colisiones con las paredes (si no es gol)
            if (ball.y < p1Goal.y) {
                if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx = -ball.vx * 0.6; }
                if (ball.x + ball.radius > 800) { ball.x = 800 - ball.radius; ball.vx = -ball.vx * 0.6; }
            }

            // Verificar Goles
            if (ball.x < goalWidth && ball.y >= p1Goal.y) {
                score2++;
                scoreDiv.innerText = `P1: ${score1} - P2: ${score2}`;
                resetPositions();
            } else if (ball.x > 800 - goalWidth && ball.y >= p2Goal.y) {
                score1++;
                scoreDiv.innerText = `P1: ${score1} - P2: ${score2}`;
                resetPositions();
            }
        }

        function checkCollision(p) {
            let dx = ball.x - p.x;
            let dy = ball.y - p.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < p.radius + ball.radius) {
                // Dirección del empuje
                let angle = Math.atan2(dy, dx);
                let speed = p.kicking ? 14 : 7; // Si patea, sale con super fuerza

                ball.vx = Math.cos(angle) * speed;
                ball.vy = Math.sin(angle) * speed - 2; // Un empuje hacia arriba
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar Arcos
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.fillRect(p1Goal.x, p1Goal.y, p1Goal.w, p1Goal.h);
            ctx.fillRect(p2Goal.x, p2Goal.y, p2Goal.w, p2Goal.h);
            
            // Postes de los arcos
            ctx.strokeStyle = "white";
            ctx.lineWidth = 5;
            ctx.strokeRect(p1Goal.x, p1Goal.y, p1Goal.w, p1Goal.h);
            ctx.strokeRect(p2Goal.x, p2Goal.y, p2Goal.w, p2Goal.h);

            // Dibujar Jugador 1
            ctx.beginPath();
            ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI * 2);
            ctx.fillStyle = p1.color;
            ctx.fill();
            ctx.closePath();
            
            // Ojo de patear J1
            ctx.fillStyle = "white";
            ctx.fillRect(p1.x + (p1.kicking ? 5 : 10), p1.y - 12, 8, 8);

            // Dibujar Jugador 2
            ctx.beginPath();
            ctx.arc(p2.x, p2.y, p2.radius, 0, Math.PI * 2);
            ctx.fillStyle = p2.color;
            ctx.fill();
            ctx.closePath();
            
            // Ojo de patear J2
            ctx.fillStyle = "white";
            ctx.fillRect(p2.x - (p2.kicking ? 13 : 18), p2.y - 12, 8, 8);

            // Dibujar Pelota
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();
        }

        function gameLoop() {
            updatePlayer(p1, true);
            updatePlayer(p2, false);
            updateBall();
            
            checkCollision(p1);
            checkCollision(p2);
            
            draw();
            requestAnimationFrame(gameLoop);
        }

        resetPositions();
        gameLoop();
    </script>
</body>
</html>
